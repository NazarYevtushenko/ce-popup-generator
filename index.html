<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OlyBet Executive Editor Pro</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body>

<div class="sidebar">
    <!-- <img src="https://beefreefilestorage.optimove.net/images/001523/editor_images/Untitled%20design.png" alt="OlyBet Logo" class="brand-logo"> -->
    
    <div class="sidebar-content">
        <h2>PopUp Editor Pro 🚀</h2>

        <div class="assets-container">
            <label style="color: #0369a1;">☁️ ОБЩАЯ БИБЛИОТЕКА</label>
            <div class="view-toggle">
                <button id="btn-grid" class="active" onclick="toggleView('grid')">Сетка</button>
                <button id="btn-list" onclick="toggleView('list')">Список</button>
            </div>
            <div id="assets-display"></div>
            <div class="asset-add-form">
    <input id="asset-name" type="text" placeholder="Название файла">
    
    <input id="asset-folder" list="folder-list" type="text" placeholder="Выбрать или создать папку">
    <datalist id="folder-list">
        </datalist>
    
    <button onclick="addAssetToCloud()" class="upload-btn green">Добавить в облако</button>
</div>
        </div>
        
        <div class="import-box">
            <label>ИМПОРТ СТАРОГО КОДА</label>
            <textarea id="import-html" placeholder="Вставьте сюда готовый HTML-код..."></textarea>
            <button class="import-btn" onclick="importHTML()">РАЗОБРАТЬ ПО ПОЛЯМ ↑</button>
        </div>

        <div class="group">
            <label>Image URL</label>
            <input id="img" type="text" oninput="generate()" placeholder="Paste image link here...">
            <button class="upload-btn" onclick="window.open('https://oeg.optimove.net/#/category/One-to-One_Campaigns/templates/show/15?brandId=Obbaltics&folderId=12&typeId=8', '_blank')">
                ☁️ Upload in Optimove
            </button>
        </div>

        <div class="group"><label>Sub Headline</label><input id="sub" type="text" oninput="generate()"></div>
        <div class="group"><label>Headline</label><input id="head" type="text" oninput="generate()"></div>
        
        <div class="group">
            <label>Main Text (Ctrl+B = Bold)</label>
            <textarea id="main" oninput="generate()" style="height: 80px;"></textarea>
        </div>
        
        <div class="group">
            <label class="checkbox-group">
                <input type="checkbox" id="cta-toggle" checked onchange="generate()">
                <span>Показывать кнопку</span>
            </label>
            <label>Button Text</label>
            <input id="btn" type="text" oninput="generate()">
        </div>
        
        <div class="group">
            <label>Link URL</label>
            <input id="link" type="text" oninput="generate()">
        </div>

        <button class="copy-btn" onclick="copyCode()">СКОПИРОВАТЬ НОВЫЙ КОД</button>

        <div class="team-mention">
            Made with <span class="heart">❤️</span> for <br>
            <b>OlyBet Executive Team</b><br>
            <small>(Veronika, Maria, Valeria, Angelina, Kitija)</small>
        </div>
    </div>
</div>

<div class="workspace">
    <div class="preview-area" id="preview-box"></div>
    <div class="code-area">
        <label>HTML Source</label>
        <textarea id="output-code" readonly></textarea>
    </div>
</div>

<script src="firebase-config.js"></script>
<script src="script.js"></script>
</body>

</html>
